version: 2
project_name: vpnkit

builds:
  - id: vpnkit
    main: ./cmd/vpnkit
    binary: vpnkit
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: vpnkit
    name_template: "vpnkit_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - README_zh.md

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

release:
  github:
    owner: JimZhang168872
    name: vpnkit
  draft: false
  # Stable releases (v1.0.0, v1.0.1, …) ship as non-prerelease.
  # When tagging a pre-release (rc.X, beta.X), bump this back to `auto`
  # or pass `--release-notes` overrides for that one tag.
  prerelease: false
  mode: replace
