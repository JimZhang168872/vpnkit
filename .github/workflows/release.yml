name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # GoReleaser needs this to create the GitHub release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # required: goreleaser walks commits to compute changelog
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When multiple tags point to the same commit, `git describe` may pick
          # a tag other than the one that triggered this workflow. Pin to the
          # exact tag that was pushed so the release goes to the right place.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
